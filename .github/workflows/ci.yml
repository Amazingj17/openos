name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      TRISCHED_GIT_HEAD: ${{ github.sha }}
      TRISCHED_GIT_DIRTY: "false"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --no-deps -r requirements-lock.txt
          python -m pip install --no-build-isolation --no-deps .
          python -m pip check

      - name: Run tests
        run: python -m pytest -q

      - name: Run training and evaluation smoke
        run: |
          python -m trisched pipeline --config configs/smoke.json --output outputs/ci-smoke
          python -m trisched evaluate --config configs/smoke.json --checkpoint outputs/ci-smoke/masked_mlp.npz --split test --output outputs/ci-eval

      - name: Validate structured evidence
        run: >-
          python -c "import hashlib,json,pathlib;
          root=pathlib.Path('outputs/ci-eval');
          s=json.loads((root/'evaluation_summary.json').read_text(encoding='utf-8'));
          m=json.loads((root/'run_manifest.json').read_text(encoding='utf-8'));
          assert s['dataset']['count']==20;
          assert s['metrics']['masked_mlp']['valid_schedule_rate']==1.0;
          assert s['metrics']['masked_mlp']['failure_rate']==0.0;
          assert len(s['checkpoint']['sha256'])==64;
          assert m['code']['commit']=='${{ github.sha }}';
          assert m['code']['working_tree_dirty'] is False;
          assert all(hashlib.sha256((root/name).read_bytes()).hexdigest()==item['sha256'] for name,item in m['artifacts'].items())"

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            outputs/ci-smoke/summary.json
            outputs/ci-smoke/test_per_instance.csv
            outputs/ci-smoke/test_failures.jsonl
            outputs/ci-smoke/run_manifest.json
            outputs/ci-eval/evaluation_summary.json
            outputs/ci-eval/test_per_instance.csv
            outputs/ci-eval/test_failures.jsonl
            outputs/ci-eval/run_manifest.json
          if-no-files-found: warn
          retention-days: 14

  openeuler-smoke:
    name: openEuler 24.03 LTS SP4 / Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run pinned openEuler CPU smoke
        run: |
          image="openeuler/openeuler:24.03-lts-sp4@sha256:17c15554be2a5bc46023acb6e04d609d77642b8c20e236e88deb18e41ae4558e"
          docker pull "${image}"
          docker run --rm \
            --env "TRISCHED_GIT_HEAD=${GITHUB_SHA}" \
            --env "TRISCHED_GIT_DIRTY=false" \
            --mount "type=bind,source=${GITHUB_WORKSPACE},target=/workspace" \
            "${image}" \
            bash /workspace/scripts/openeuler_smoke.sh \
            /workspace /workspace/outputs/ci-openeuler

      - name: Validate openEuler evidence
        run: >-
          python -c "import json,pathlib;
          p=pathlib.Path('outputs/ci-openeuler/validation.json');
          s=json.loads(p.read_text(encoding='utf-8'));
          assert s['status']=='pass';
          assert s['test_count']>=139;
          assert s['dataset_hash_intersections']=={'train_validation':0,'train_test':0,'validation_test':0};
          assert len(s['checkpoint_sha256'])==64"

      - name: Upload openEuler evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-openeuler-24.03-lts-sp4
          path: |
            outputs/ci-openeuler/platform.txt
            outputs/ci-openeuler/pip-freeze.txt
            outputs/ci-openeuler/pytest.xml
            outputs/ci-openeuler/validation.json
            outputs/ci-openeuler/sha256.txt
            outputs/ci-openeuler/pipeline/summary.json
            outputs/ci-openeuler/pipeline/test_per_instance.csv
            outputs/ci-openeuler/pipeline/test_failures.jsonl
            outputs/ci-openeuler/pipeline/run_manifest.json
            outputs/ci-openeuler/evaluate/evaluation_summary.json
            outputs/ci-openeuler/evaluate/test_per_instance.csv
            outputs/ci-openeuler/evaluate/test_failures.jsonl
            outputs/ci-openeuler/evaluate/run_manifest.json
          if-no-files-found: warn
          retention-days: 14
